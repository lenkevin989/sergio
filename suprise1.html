<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💝 A Surprise For You 💝</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Great+Vibes&family=Parisienne&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a0b0b, #2d1a1a, #3d1f2b);
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }
        
        /* Main container */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        
        /* Box styling - this is what she sees first */
        .surprise-box {
            width: 300px;
            height: 300px;
            background: linear-gradient(145deg, #ff3366, #ff1493);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(255, 20, 147, 0.5),
                        0 0 30px rgba(255, 105, 180, 0.6),
                        inset 0 -5px 15px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            animation: floatBox 3s ease-in-out infinite;
            border: 3px solid rgba(255, 255, 255, 0.3);
        }
        
        .surprise-box:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 30px 50px rgba(255, 20, 147, 0.7),
                        0 0 40px rgba(255, 105, 180, 0.8);
        }
        
        @keyframes floatBox {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        /* Ribbon decoration on the box */
        .ribbon {
            width: 120px;
            height: 30px;
            background: linear-gradient(90deg, #ffd700, #ffa500, #ffd700);
            border-radius: 50px;
            margin: 10px 0;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.5);
            position: relative;
            transform: rotate(-5deg);
        }
        
        .ribbon::before, .ribbon::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 60px;
            background: linear-gradient(90deg, #ffd700, #ffa500);
            border-radius: 30px;
            top: -15px;
        }
        
        .ribbon::before { left: 10px; transform: rotate(-20deg); }
        .ribbon::after { right: 10px; transform: rotate(20deg); }
        
        .box-lid {
            width: 280px;
            height: 30px;
            background: linear-gradient(145deg, #ff1a4f, #cc0052);
            border-radius: 20px 20px 0 0;
            margin-top: -20px;
            box-shadow: 0 -5px 10px rgba(0,0,0,0.2);
            transform: rotateX(10deg);
        }
        
        .click-text {
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 15px 0;
            background: rgba(255,255,255,0.2);
            padding: 10px 25px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            animation: pulseText 2s infinite;
        }
        
        @keyframes pulseText {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); background: rgba(255,255,255,0.3); }
        }
        
        /* Surprise content - initially hidden */
        .surprise-content {
            display: none;
            text-align: center;
            animation: fadeIn 1.5s ease;
            width: 100%;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        /* Main message styling - "I love Part of me" */
        .message {
            font-size: 4.5rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493, 0 0 60px #ff3366;
            margin-bottom: 30px;
            position: relative;
            font-family: 'Dancing Script', cursive;
            letter-spacing: 3px;
            animation: glowPulse 2s infinite;
            white-space: nowrap;
        }
        
        @media (max-width: 600px) {
            .message { font-size: 3rem; white-space: normal; }
        }
        
        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 20px #ff69b4, 0 0 40px #ff1493, 0 0 60px #ff3366; }
            50% { text-shadow: 0 0 30px #ff1493, 0 0 60px #ff3366, 0 0 90px #ff69b4; }
        }
        
        /* Heart background animation */
        .hearts-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }
        
        .heart {
            position: absolute;
            font-size: 20px;
            color: rgba(255, 105, 180, 0.5);
            animation: floatHeart 6s linear infinite;
            user-select: none;
        }
        
        @keyframes floatHeart {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }
        
        /* Decorative elements */
        .sparkles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        
        .sparkle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            animation: sparkle 2s infinite;
        }
        
        @keyframes sparkle {
            0%, 100% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1); }
        }
        
        /* Back button styling */
        .back-button {
            margin-top: 40px;
            padding: 15px 40px;
            background: linear-gradient(45deg, #ff3366, #ff1493);
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(255, 20, 147, 0.6);
            transition: all 0.3s;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }
        
        .back-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.9);
        }
        
        .box-hidden {
            display: none;
        }
        
        .content-visible {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- The Box (initially visible) -->
        <div id="surpriseBox" class="surprise-box">
            <div class="box-lid"></div>
            <div class="ribbon"></div>
            <div class="click-text">✨ Click to Open ✨</div>
            <div class="ribbon"></div>
            <div style="font-size: 50px; margin-top: 10px;">🎁</div>
        </div>
        
        <!-- Surprise Content (initially hidden) -->
        <div id="surpriseContent" class="surprise-content">
            <div class="message">I love Part of meh 💝 </div>
            <button class="back-button" onclick="showBox()">💝 Open Again 💝</button>
        </div>
    </div>
    
    <!-- Floating Hearts Background -->
    <div class="hearts-background" id="hearts"></div>
    
    <script>
        // Create floating hearts
        function createHeart() {
            const heartsContainer = document.getElementById('hearts');
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = Math.random() * 30 + 20 + 'px';
            heart.style.animationDuration = Math.random() * 4 + 3 + 's';
            heart.style.opacity = Math.random() * 0.5 + 0.3;
            heartsContainer.appendChild(heart);
            
            // Remove heart after animation
            setTimeout(() => {
                heart.remove();
            }, 8000);
        }
        
        // Create hearts continuously
        setInterval(createHeart, 300);
        
        // Function to show the surprise
        function showSurprise() {
            const box = document.getElementById('surpriseBox');
            const content = document.getElementById('surpriseContent');
            
            box.style.animation = 'none';
            box.style.transform = 'scale(0.1)';
            box.style.opacity = '0';
            
            setTimeout(() => {
                box.classList.add('box-hidden');
                content.classList.add('content-visible');
                
                // Create burst of hearts
                for (let i = 0; i < 20; i++) {
                    setTimeout(() => {
                        createHeart();
                    }, i * 50);
                }
            }, 500);
        }
        
        // Function to show box again
        function showBox() {
            const box = document.getElementById('surpriseBox');
            const content = document.getElementById('surpriseContent');
            
            content.classList.remove('content-visible');
            box.classList.remove('box-hidden');
            
            box.style.transform = 'scale(1)';
            box.style.opacity = '1';
            box.style.animation = 'floatBox 3s ease-in-out infinite';
        }
        
        // Add click event to box
        document.getElementById('surpriseBox').addEventListener('click', showSurprise);
        
        // Create initial hearts
        for (let i = 0; i < 10; i++) {
            setTimeout(() => {
                createHeart();
            }, i * 200);
        }
    </script>
</body>
</html>
